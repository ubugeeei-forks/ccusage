name: CI

on:
  push:
  pull_request:

permissions: read-all

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-slim
    outputs:
      code-changed: ${{ steps.detect.outputs.code-changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        uses: ./.github/actions/detect-code-changes

  lint-check:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - run: nix flake check --print-build-logs
      - run: nix develop --command pnpm typecheck

  test:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - name: Create default Claude directories for tests
        run: |
          mkdir -p "$HOME/.claude/projects"
          mkdir -p "$HOME/.config/claude/projects"
      - run: nix develop --command pnpm run test

  build-native-packages:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    permissions:
      actions: write
      contents: read
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            binary: result/bin/ccusage
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            binary: result/bin/ccusage
          - os: macos-latest
            platform: darwin
            arch: arm64
            binary: rust/target/release/ccusage
          - os: macos-15-intel
            platform: darwin
            arch: x64
            binary: rust/target/release/ccusage
          - os: windows-11-arm
            platform: win32
            arch: arm64
            binary: rust/target/release/ccusage.exe
          - os: windows-latest
            platform: win32
            arch: x64
            binary: rust/target/release/ccusage.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
        if: matrix.platform == 'linux'
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Cache Cargo build
        if: matrix.platform != 'linux'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-
      - name: Build Linux static binary
        if: matrix.platform == 'linux'
        run: nix build .#ccusage-static
      - name: Verify Linux binary is static
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          file "${{ matrix.binary }}"
          if ldd "${{ matrix.binary }}" > "$RUNNER_TEMP/ldd.txt" 2>&1; then
            cat "$RUNNER_TEMP/ldd.txt"
            grep -Eiq 'not a dynamic executable|statically linked' "$RUNNER_TEMP/ldd.txt"
          else
            cat "$RUNNER_TEMP/ldd.txt"
            grep -Eiq 'not a dynamic executable|statically linked' "$RUNNER_TEMP/ldd.txt"
          fi
      - name: Build Cargo native binary
        if: matrix.platform != 'linux'
        run: cargo build --manifest-path rust/Cargo.toml --release --bin ccusage
      - run: node apps/ccusage/scripts/stage-native-package.mjs --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}" --binary "${{ matrix.binary }}"
      - name: Archive native package binary
        shell: bash
        run: tar -cf "ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}.tar" "packages/ccusage-${{ matrix.platform }}-${{ matrix.arch }}/bin"
      - uses: actions/upload-artifact@v4
        with:
          name: ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}
          path: ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}.tar
          if-no-files-found: error

  npm-publish-dry-run-and-upload-pkg-pr-now:
    needs:
      - changes
      - build-native-packages
    if: needs.changes.outputs.code-changed == 'true'
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-24.04-arm
    outputs:
      urls: ${{ steps.publish.outputs.urls }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - uses: actions/download-artifact@v4
        with:
          pattern: ccusage-native-*
          path: ${{ runner.temp }}/native-packages
          merge-multiple: true
      - name: Restore native package binaries
        run: |
          for archive in "$RUNNER_TEMP"/native-packages/*.tar; do
            tar -xf "$archive"
          done
      - id: publish
        run: nix develop --command pnpm pkg-pr-new publish --pnpm --bin './apps/ccusage' './packages/ccusage-*'

  ccusage-preview-e2e:
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-slim
          - macos-latest
          - windows-11-arm
          - windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Prepare preview package E2E
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: node .github/scripts/e2e-setup.mjs
      - name: Run preview package E2E with Node
        shell: pwsh
        run: |
          npx --yes "$env:CCUSAGE_PREVIEW_URL" --version
          npx --yes "$env:CCUSAGE_PREVIEW_URL" daily --offline --json | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"
          npx --yes "$env:CCUSAGE_PREVIEW_URL" daily --offline
      - name: Enable pnpm
        if: runner.os != 'Windows'
        run: corepack enable pnpm
      - name: Run preview package E2E with pnpm dlx
        if: runner.os != 'Windows'
        shell: pwsh
        run: |
          pnpm --config.block-exotic-subdeps=false dlx "$env:CCUSAGE_PNPM_DLX_URL" --version
          pnpm --config.block-exotic-subdeps=false dlx "$env:CCUSAGE_PNPM_DLX_URL" daily --offline --json | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"
          pnpm --config.block-exotic-subdeps=false dlx "$env:CCUSAGE_PNPM_DLX_URL" daily --offline

  ccusage-perf-comment:
    name: ccusage perf comment
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Resolve PR preview package URL
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: |
          preview_url="$(
            node -e 'const urls = (process.env.PKG_PR_NEW_URLS ?? "").split(/\s+/).filter(Boolean); const url = urls.find((candidate) => /(?:^|\/)ccusage@/.test(candidate)); if (url == null) { throw new Error(`ccusage preview URL not found in: ${urls.join(", ")}`); } console.log(url);'
          )"
          echo "CCUSAGE_PREVIEW_URL=$preview_url" >> "$GITHUB_ENV"

      - name: Generate large ccusage fixture
        run: |
          nix develop --command pnpm exec bun apps/ccusage/scripts/generate-large-fixture.ts \
            --output-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --codex-output-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --size-mib 1024

      - name: Compare fixture performance
        run: |
          nix develop --command pnpm exec bun apps/ccusage/scripts/compare-pr-performance.ts \
            --base-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.base.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-dir . \
            --head-package-url "$CCUSAGE_PREVIEW_URL" \
            --fixture-dir apps/ccusage/test/fixtures/claude \
            --codex-fixture-dir apps/ccusage/test/fixtures/codex \
            --warmup 2 \
            --runs 7 \
            --large-fixture-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --large-codex-fixture-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --large-warmup 0 \
            --large-runs 1 \
            --package-runner-timeout-ms 1800000 \
            --output "$RUNNER_TEMP/ccusage-perf-comment.md"

      - name: Write job summary
        run: cat "$RUNNER_TEMP/ccusage-perf-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          COMMENT_FILE: ${{ runner.temp }}/ccusage-perf-comment.md
          COMMENT_MARKER: <!-- ccusage-perf-comment:${{ github.event.pull_request.head.sha }} -->
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: nix develop --command pnpm exec bun .github/scripts/upsert-pr-comment.ts

  ccusage-rust-perf-comment:
    name: ccusage rust perf comment
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Resolve PR preview package URL
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: |
          preview_url="$(
            node -e 'const urls = (process.env.PKG_PR_NEW_URLS ?? "").split(/\s+/).filter(Boolean); const url = urls.find((candidate) => /(?:^|\/)ccusage@/.test(candidate)); if (url == null) { throw new Error(`ccusage preview URL not found in: ${urls.join(", ")}`); } console.log(url);'
          )"
          echo "CCUSAGE_PREVIEW_URL=$preview_url" >> "$GITHUB_ENV"

      - name: Generate large ccusage fixture
        run: |
          nix develop --command pnpm exec bun apps/ccusage/scripts/generate-large-fixture.ts \
            --output-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --codex-output-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --size-mib 1024

      - name: Compare Rust performance
        run: |
          nix develop --command pnpm exec bun apps/ccusage/scripts/compare-pr-performance.ts \
            --base-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.base.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-dir . \
            --head-package-url "$CCUSAGE_PREVIEW_URL" \
            --head-runtime rust \
            --fixture-dir apps/ccusage/test/fixtures/claude \
            --codex-fixture-dir apps/ccusage/test/fixtures/codex \
            --warmup 2 \
            --runs 7 \
            --large-fixture-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --large-codex-fixture-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --large-warmup 0 \
            --large-runs 1 \
            --package-runner-timeout-ms 1800000 \
            --output "$RUNNER_TEMP/ccusage-rust-perf-comment.md"

      - name: Write job summary
        run: cat "$RUNNER_TEMP/ccusage-rust-perf-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          COMMENT_FILE: ${{ runner.temp }}/ccusage-rust-perf-comment.md
          COMMENT_MARKER: <!-- ccusage-rust-perf-comment:${{ github.event.pull_request.head.sha }} -->
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: nix develop --command pnpm exec bun .github/scripts/upsert-pr-comment.ts

  schema-check:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - name: Generate schema files
        run: nix develop --command pnpm run generate:schema
        working-directory: apps/ccusage
      - name: Check if schema files are up-to-date
        run: |
          if git diff --exit-code apps/ccusage/config-schema.json docs/public/config-schema.json; then
            echo "✅ Schema files are up-to-date"
          else
            echo "❌ Schema files are not up-to-date. Please run 'pnpm run generate:schema' and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only apps/ccusage/config-schema.json docs/public/config-schema.json
            echo ""
            echo "Diff:"
            git diff apps/ccusage/config-schema.json docs/public/config-schema.json
            exit 1
          fi
